<div style="padding:24px 32px;">
    <span class="detail-back" onclick="Logs.returnFromDetail()">&larr; 返回任务列表</span>
    <div class="page-header" style="margin-top:0;margin-bottom:20px;">
        <div class="page-title">
            <span class="page-title-icon"><span data-icon="file-text"></span></span>
            任务详情 - <span style="color:var(--accent-blue)" id="detailJobId">-</span>
        </div>
    </div>
    <div class="detail-grid">
        <div class="detail-sidebar">
            <div class="detail-section">
                <div class="detail-section-title"><span data-icon="file-text"></span> 基本信息</div>
                <div id="detailErrorBlock"></div>
                <div class="detail-field"><span class="detail-field-label">任务ID</span><span class="detail-field-value" id="detailTaskId">-</span></div>
                <div class="detail-field"><span class="detail-field-label">执行时间</span><span class="detail-field-value" id="detailExecTime">-</span></div>
                <div class="detail-field"><span class="detail-field-label">状态</span><span class="detail-field-value" id="detailStatus">-</span></div>
                <div class="detail-field"><span class="detail-field-label">耗时</span><span class="detail-field-value" id="detailDuration">-</span></div>
                <div class="detail-field"><span class="detail-field-label">同步行数</span><span class="detail-field-value" id="detailRowsTotal">-</span></div>
                <div class="detail-field"><span class="detail-field-label">数据源库</span><span class="detail-field-value" id="detailSourceDb">-</span></div>
                <div class="detail-field"><span class="detail-field-label">目标库</span><span class="detail-field-value" id="detailTargetDb">-</span></div>
            </div>
        </div>
        <div class="detail-main">
            <div class="detail-section">
                <div class="detail-section-title"><span data-icon="bar-chart"></span> 同步统计</div>
                <div class="stats-row">
                    <div class="stat-card blue"><div class="stat-label">INSERT</div><div class="stat-value" id="detailInsertCount">0</div></div>
                    <div class="stat-card green"><div class="stat-label">UPDATE</div><div class="stat-value" id="detailUpdateCount">0</div></div>
                    <div class="stat-card red"><div class="stat-label">ERROR</div><div class="stat-value" id="detailErrorCount">0</div></div>
                </div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title"><span data-icon="clock"></span> 执行日志</div>
                <div class="log-timeline" id="detailTimeline"></div>
            </div>
        </div>
    </div>
</div>

<template id="tpl-timeline-item">
    <div class="log-timeline-item">
        <div class="log-timeline-time"></div>
        <div class="log-timeline-msg"></div>
    </div>
</template>
