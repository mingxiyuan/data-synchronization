# 生产环境配置模板（通过环境变量注入，禁止写入真实密码）
# 启动示例（参数放入 Program arguments，--key=value 形式）:
#   java -jar transdb.jar --spring.profiles.active=prod \
#        --DB_URL=jdbc:oracle:thin:@host:1521/sid \
#        --DB_USERNAME=xxx --DB_PASSWORD=xxx
# 说明: Spring Boot 会把 --DB_URL=xxx 解析为属性 DB_URL，故 ${DB_URL} 占位符可正常取值
# 也可用 VM options 的 -DDB_URL=xxx 形式，效果相同
spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=oracle.jdbc.OracleDriver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
