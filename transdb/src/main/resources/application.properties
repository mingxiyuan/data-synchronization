server.servlet.encoding.force=true
server.servlet.encoding.charset=UTF-8

server.port=9005
server.servlet.context-path=/transdb
spring.application.name=transdb
spring.profiles.active=dev
logging.file=log/transdb.log
logging.file.max-size=100MB
#格式化输出日期时间
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.trans.model.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=VARCHAR

# AES-256密码存储加密密钥(64个十六进制字符=32字节=256bit)
# 生产环境通过环境变量 TRANSDB_AES_KEY 注入, 生成命令: openssl rand -hex 32
transdb.aes-key=${TRANSDB_AES_KEY:a3f8b7c2d1e9460582b3f4a7c6d0e5193b7a8f2c4d6e1f0a9b8c7d5e4f3a2b10}

# 入库子批次大小(出库批次的细分), 建议为出库批次的1/2~1/4, 太小增加事务开销
transdb.sync.sub-batch-size=500
# 源库并行读取分段数, 每个分段独立出库连接并行读取, 大表建议2-4
transdb.sync.source-parallelism=2

# Druid连接池配置(每个数据库连接独立一个池)
transdb.pool.max-active=20
transdb.pool.max-total-connections=500

# 同步执行线程池
transdb.sync.core-threads=20
transdb.sync.max-threads=40

# 入库写入线程池
transdb.merge.core-threads=10
transdb.merge.max-threads=20
transdb.sync.queue-size=80

# CLOB/BLOB大小限制
transdb.max-clob-size=10485760
transdb.max-blob-size=52428800

# Sa-Token 配置
sa-token.token-name=Authorization
sa-token.timeout=86400
sa-token.active-timeout=1800
sa-token.is-concurrent=true
sa-token.is-share=false
sa-token.token-style=uuid
sa-token.is-log=true
# JWT模式
sa-token.jwt-secret-key=transdb2026syncplatformkey

# Actuator: 只暴露health, 其他端点关闭
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

